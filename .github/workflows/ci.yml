name: CI

on:
  push:
    branches: [main, v12.0.0]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Type check (src + tests)
        run: npm run typecheck && npm run typecheck:test

      - name: Build
        run: npm run build

      - name: Unit + integration tests with coverage (90% thresholds enforced)
        run: npm run test:coverage

      - name: End-to-end tests (spawned stdio server)
        run: npm run test:e2e

      - name: Badge freshness gate
        if: matrix.node == 22
        run: npm run badges && git diff --exit-code README.md

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-node${{ matrix.node }}
          path: coverage/
          if-no-files-found: ignore
